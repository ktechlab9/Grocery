<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Aisle" />
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="icon" type="image/png" href="icon.png"/>
<title>Aisle — Grocery List</title>
<style>
:root {
  --paper: #FAF6EF; --paper-light: #FFFDF9; --ink: #2A2823;
  --line: #E7DFCF; --muted: #8A8577; --muted-2: #B7AF9B;
  --green: #4C7A56; --red: #B15142; --checked-bg: #F3EFE5;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  background: var(--paper); color: var(--ink);
  padding-bottom: env(safe-area-inset-bottom);
}
h1, h2 { font-family: inherit; }
.hidden { display: none !important; }
.wrap { max-width: 720px; margin: 0 auto; padding: 0 16px; }
.topbar { border-bottom: 1px solid var(--line); background: var(--paper-light); padding: max(20px, env(safe-area-inset-top)) 0 16px; }
.brand { display: flex; align-items: center; gap: 8px; }
.brand h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
.tagline { color: var(--muted); font-size: 0.82rem; margin: 2px 0 0; }
.tabbar { border-bottom: 1px solid var(--line); background: var(--paper-light); position: sticky; top: 0; z-index: 5; }
.tab-scroll { display: flex; align-items: center; gap: 8px; overflow-x: auto; padding: 8px 0; scrollbar-width: none; }
.tab-scroll::-webkit-scrollbar { display: none; }
.tab {
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
  padding: 7px 12px; border-radius: 999px; border: 1px solid var(--line);
  background: transparent; color: var(--ink); font-size: 0.875rem; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tab .count { background: #EFE9DA; color: #6B6554; font-size: 0.7rem; font-weight: 600; padding: 1px 6px; border-radius: 999px; }
.tab.active .count { background: var(--green); color: var(--paper); }
.tab-add {
  display: flex; align-items: center; gap: 4px; white-space: nowrap;
  padding: 7px 12px; border-radius: 999px; border: 1px dashed #C9BFA8;
  background: transparent; color: var(--muted); font-size: 0.875rem; font-weight: 500;
  cursor: pointer; font-family: inherit;
}
.tab-new-input { padding: 7px 10px; border-radius: 999px; border: 1px solid var(--line); font-size: 16px; width: 110px; font-family: inherit; }
.content { padding: 20px 16px 60px; }
.center-note { text-align: center; color: var(--muted); padding: 64px 16px; }
.center-note .main-line { font-size: 0.95rem; margin: 0; }
.center-note .sub-line { font-size: 0.8rem; margin: 4px 0 0; }
.path-strip { display: flex; align-items: center; gap: 0; margin-bottom: 20px; padding: 4px 0; overflow-x: auto; scrollbar-width: none; }
.path-strip::-webkit-scrollbar { display: none; }
.path-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--line); border: none; cursor: default; padding: 0; }
.path-dot.has-items { cursor: pointer; }
.path-line { width: 14px; height: 1px; background: var(--line); flex-shrink: 0; }
.path-label { color: var(--muted); font-size: 0.75rem; margin-left: 8px; white-space: nowrap; }
.add-form { border: 1px solid var(--line); background: var(--paper-light); border-radius: 12px; padding: 12px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.add-form input[type="text"] { flex: 1; min-width: 140px; }
.add-form input, .add-form select { border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; font-size: 16px; background: #fff; font-family: inherit; color: var(--ink); }
.add-form input[type="number"] { width: 60px; text-align: center; }
.btn-primary { display: flex; align-items: center; gap: 5px; background: var(--ink); color: var(--paper); border: none; border-radius: 8px; padding: 9px 14px; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit; }
.category-section { margin-bottom: 24px; }
.category-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.category-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.category-head h2 { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
.category-count { color: var(--muted-2); font-size: 0.75rem; }
.item-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
.item-row { display: flex; align-items: center; gap: 12px; border: 1px solid var(--line); background: var(--paper-light); border-radius: 10px; padding: 10px 12px; }
.item-row.checked-row { background: var(--checked-bg); }
.item-check { width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0; cursor: pointer; background: transparent; padding: 0; }
.item-name { flex: 1; font-size: 0.9rem; }
.item-name.struck { text-decoration: line-through; color: var(--muted-2); }
.item-qty { color: var(--muted); font-size: 0.8rem; }
.item-remove { color: var(--muted-2); background: none; border: none; cursor: pointer; display: flex; padding: 4px; }
.checked-toggle { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.875rem; font-weight: 500; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 8px; font-family: inherit; }
.checked-toggle svg { transition: transform 0.15s; }
.checked-toggle.open svg { transform: rotate(180deg); }
.clear-btn { display: flex; align-items: center; gap: 4px; color: var(--red); background: none; border: none; font-size: 0.75rem; font-weight: 500; cursor: pointer; padding: 8px 0; font-family: inherit; }
.remove-store-wrap { margin-top: 40px; padding-top: 16px; border-top: 1px solid var(--line); }
.remove-store-btn { color: var(--muted-2); background: none; border: none; font-size: 0.75rem; cursor: pointer; font-family: inherit; padding: 8px 0; }
</style>
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4C7A56" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <h1>Aisle</h1>
      </div>
      <p class="tagline">One list per store, laid out the way you'll actually walk it.</p>
    </div>
  </header>

  <nav class="tabbar">
    <div class="wrap"><div id="storeTabs" class="tab-scroll"></div></div>
  </nav>

  <main class="wrap content">
    <div id="emptyStoreState" class="hidden center-note">Add a store to start a list.</div>

    <div id="storeView" class="hidden">
      <div id="pathStrip" class="path-strip"></div>

      <form id="addItemForm" class="add-form">
        <input id="itemName" type="text" placeholder="Add an item…" autocomplete="off" />
        <input id="itemQty" type="number" min="1" value="1" />
        <select id="itemCategory"></select>
        <button type="submit" class="btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          Add
        </button>
      </form>

      <div id="listEmptyState" class="hidden center-note">
        <p class="main-line">This store's list is empty.</p>
        <p class="sub-line">Add something above to start filling the aisles.</p>
      </div>

      <div id="categorySections"></div>

      <div id="checkedSection" class="hidden">
        <button id="toggleChecked" class="checked-toggle">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          <span id="checkedCount">In the cart (0)</span>
        </button>
        <ul id="checkedList" class="item-list hidden"></ul>
        <button id="clearChecked" class="clear-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>
          Clear checked
        </button>
      </div>

      <div id="removeStoreWrap" class="hidden remove-store-wrap">
        <button id="removeStoreBtn" class="remove-store-btn"></button>
      </div>
    </div>
  </main>

<script>
// ---------- everything lives in this one file: markup, styles, logic, storage ----------

const CATEGORIES = [
  { id: "produce", label: "Produce", color: "#4C7A56" },
  { id: "bakery", label: "Bakery", color: "#B98A4E" },
  { id: "dairy", label: "Dairy & Eggs", color: "#7A9CB5" },
  { id: "meat", label: "Meat & Seafood", color: "#B15142" },
  { id: "frozen", label: "Frozen", color: "#2F6E8C" },
  { id: "pantry", label: "Pantry", color: "#A67C3D" },
  { id: "household", label: "Household", color: "#7C6E8C" },
  { id: "other", label: "Other", color: "#8A8577" },
];

const KEYWORDS = {
  produce: ["apple", "banana", "carrot", "lettuce", "tomato", "onion", "potato", "spinach", "fruit", "veg", "avocado", "berr", "lemon", "lime", "capsicum", "broccoli", "mushroom", "garlic", "cucumber", "grape"],
  bakery: ["bread", "roll", "bagel", "croissant", "bun", "cake", "muffin", "pastry", "baguette"],
  dairy: ["milk", "cheese", "yog", "butter", "cream", "egg"],
  meat: ["chicken", "beef", "pork", "lamb", "mince", "bacon", "sausage", "fish", "salmon", "prawn", "seafood", "turkey"],
  frozen: ["frozen", "ice cream", "peas", "fries", "pizza"],
  pantry: ["rice", "pasta", "flour", "sugar", "oil", "sauce", "can", "cereal", "tea", "coffee", "spice", "salt", "beans", "nuts", "snack", "biscuit", "chips"],
  household: ["paper towel", "toilet", "detergent", "soap", "cleaner", "bin bag", "foil", "wrap", "tissue", "sponge", "battery"],
};

function guessCategory(name) {
  const n = name.toLowerCase();
  for (const [cat, words] of Object.entries(KEYWORDS)) {
    if (words.some((w) => n.includes(w))) return cat;
  }
  return "other";
}

const STORAGE_KEY = "aisle-grocery-data-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* fall through to default */ }
  return {
    stores: [
      { id: "s1", name: "Woolworths" },
      { id: "s2", name: "Coles" },
      { id: "s3", name: "Costco" },
    ],
    items: [],
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let activeStoreId = state.stores[0]?.id || null;
let checkedOpen = false;

function newId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// --- DOM refs ---
const storeTabsEl = document.getElementById("storeTabs");
const emptyStoreStateEl = document.getElementById("emptyStoreState");
const storeViewEl = document.getElementById("storeView");
const pathStripEl = document.getElementById("pathStrip");
const addItemFormEl = document.getElementById("addItemForm");
const itemNameEl = document.getElementById("itemName");
const itemQtyEl = document.getElementById("itemQty");
const itemCategoryEl = document.getElementById("itemCategory");
const listEmptyStateEl = document.getElementById("listEmptyState");
const categorySectionsEl = document.getElementById("categorySections");
const checkedSectionEl = document.getElementById("checkedSection");
const checkedCountEl = document.getElementById("checkedCount");
const checkedListEl = document.getElementById("checkedList");
const toggleCheckedEl = document.getElementById("toggleChecked");
const clearCheckedEl = document.getElementById("clearChecked");
const removeStoreWrapEl = document.getElementById("removeStoreWrap");
const removeStoreBtnEl = document.getElementById("removeStoreBtn");

itemCategoryEl.innerHTML = CATEGORIES.map((c) => `<option value="${c.id}">${c.label}</option>`).join("");

function render() {
  renderTabs();
  const activeStore = state.stores.find((s) => s.id === activeStoreId);
  emptyStoreStateEl.classList.toggle("hidden", !!activeStore);
  storeViewEl.classList.toggle("hidden", !activeStore);
  if (!activeStore) return;

  const storeItems = state.items.filter((i) => i.storeId === activeStoreId);
  const activeItems = storeItems.filter((i) => !i.checked);
  const checkedItems = storeItems.filter((i) => i.checked);

  const grouped = {};
  CATEGORIES.forEach((c) => (grouped[c.id] = []));
  activeItems.forEach((i) => grouped[i.category]?.push(i));

  renderPathStrip(grouped);
  renderCategorySections(grouped);
  listEmptyStateEl.classList.toggle("hidden", activeItems.length > 0 || checkedItems.length > 0);
  renderChecked(checkedItems);

  removeStoreWrapEl.classList.toggle("hidden", state.stores.length <= 1);
  removeStoreBtnEl.textContent = `Remove ${activeStore.name} and its list`;
}

function renderTabs() {
  storeTabsEl.innerHTML = "";
  state.stores.forEach((s) => {
    const count = state.items.filter((i) => i.storeId === s.id && !i.checked).length;
    const btn = document.createElement("button");
    btn.className = "tab" + (s.id === activeStoreId ? " active" : "");
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7h20l-2 13H4L2 7Z"/><path d="M2 7 4 3h16l2 4"/></svg>
      ${escapeHtml(s.name)}
      ${count > 0 ? `<span class="count">${count}</span>` : ""}
    `;
    btn.addEventListener("click", () => { activeStoreId = s.id; checkedOpen = false; render(); });
    storeTabsEl.appendChild(btn);
  });

  const addBtn = document.createElement("button");
  addBtn.className = "tab-add";
  addBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg> Store`;
  addBtn.addEventListener("click", startAddStore);
  storeTabsEl.appendChild(addBtn);
}

function startAddStore() {
  const input = document.createElement("input");
  input.className = "tab-new-input";
  input.placeholder = "Store name";
  storeTabsEl.appendChild(input);
  input.focus();

  function commit() {
    const name = input.value.trim();
    if (name) {
      const store = { id: newId(), name };
      state.stores.push(store);
      activeStoreId = store.id;
      saveState();
    }
    render();
  }
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") commit();
    if (e.key === "Escape") render();
  });
  input.addEventListener("blur", commit);
}

function renderPathStrip(grouped) {
  pathStripEl.innerHTML = "";
  CATEGORIES.forEach((c, i) => {
    const has = grouped[c.id].length > 0;
    const dot = document.createElement("button");
    dot.className = "path-dot" + (has ? " has-items" : "");
    dot.style.background = has ? c.color : "";
    dot.title = c.label;
    if (has) dot.addEventListener("click", () => scrollToCategory(c.id));
    pathStripEl.appendChild(dot);
    if (i < CATEGORIES.length - 1) {
      const line = document.createElement("div");
      line.className = "path-line";
      pathStripEl.appendChild(line);
    }
  });
  const label = document.createElement("span");
  label.className = "path-label";
  label.textContent = "front door → checkout";
  pathStripEl.appendChild(label);
}

function scrollToCategory(catId) {
  document.getElementById(`cat-${catId}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderCategorySections(grouped) {
  categorySectionsEl.innerHTML = "";
  CATEGORIES.forEach((c) => {
    const items = grouped[c.id];
    if (items.length === 0) return;
    const section = document.createElement("div");
    section.className = "category-section";
    section.id = `cat-${c.id}`;
    section.innerHTML = `
      <div class="category-head">
        <span class="category-dot" style="background:${c.color}"></span>
        <h2>${c.label}</h2>
        <span class="category-count">${items.length}</span>
      </div>
      <ul class="item-list"></ul>
    `;
    const list = section.querySelector(".item-list");
    items.forEach((it) => list.appendChild(renderItemRow(it, c.color, false)));
    categorySectionsEl.appendChild(section);
  });
}

function renderItemRow(item, color, checked) {
  const li = document.createElement("li");
  li.className = "item-row" + (checked ? " checked-row" : "");

  const check = document.createElement("button");
  check.className = "item-check";
  check.style.border = `1.5px solid ${color}`;
  check.style.background = checked ? "#4C7A56" : "transparent";
  check.setAttribute("aria-label", `Mark ${item.name} ${checked ? "not bought" : "bought"}`);
  check.addEventListener("click", () => {
    item.checked = !item.checked;
    saveState();
    render();
  });

  const name = document.createElement("span");
  name.className = "item-name" + (checked ? " struck" : "");
  name.textContent = item.name;

  li.appendChild(check);
  li.appendChild(name);

  if (item.qty > 1) {
    const qty = document.createElement("span");
    qty.className = "item-qty";
    qty.textContent = `×${item.qty}`;
    li.appendChild(qty);
  }

  const remove = document.createElement("button");
  remove.className = "item-remove";
  remove.setAttribute("aria-label", `Remove ${item.name}`);
  remove.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>`;
  remove.addEventListener("click", () => {
    state.items = state.items.filter((i) => i.id !== item.id);
    saveState();
    render();
  });
  li.appendChild(remove);

  return li;
}

function renderChecked(checkedItems) {
  checkedSectionEl.classList.toggle("hidden", checkedItems.length === 0);
  if (checkedItems.length === 0) return;
  checkedCountEl.textContent = `In the cart (${checkedItems.length})`;
  toggleCheckedEl.classList.toggle("open", checkedOpen);
  checkedListEl.classList.toggle("hidden", !checkedOpen);
  checkedListEl.innerHTML = "";
  checkedItems.forEach((it) => {
    const cat = CATEGORIES.find((c) => c.id === it.category) || CATEGORIES[CATEGORIES.length - 1];
    checkedListEl.appendChild(renderItemRow(it, cat.color, true));
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

addItemFormEl.addEventListener("submit", (e) => {
  e.preventDefault();
  const name = itemNameEl.value.trim();
  if (!name || !activeStoreId) return;
  const qty = parseInt(itemQtyEl.value, 10) || 1;
  const category = itemCategoryEl.dataset.userChosen === "true" ? itemCategoryEl.value : guessCategory(name);

  state.items.push({ id: newId(), storeId: activeStoreId, name, qty, category, checked: false });
  saveState();

  itemNameEl.value = "";
  itemQtyEl.value = 1;
  itemCategoryEl.value = "other";
  itemCategoryEl.dataset.userChosen = "false";
  render();
  itemNameEl.focus();
});

itemNameEl.addEventListener("input", () => {
  if (itemCategoryEl.dataset.userChosen === "true") return;
  itemCategoryEl.value = itemNameEl.value.trim() ? guessCategory(itemNameEl.value.trim()) : "other";
});
itemCategoryEl.addEventListener("change", () => { itemCategoryEl.dataset.userChosen = "true"; });

toggleCheckedEl.addEventListener("click", () => { checkedOpen = !checkedOpen; render(); });

clearCheckedEl.addEventListener("click", () => {
  state.items = state.items.filter((i) => !(i.storeId === activeStoreId && i.checked));
  saveState();
  render();
});

removeStoreBtnEl.addEventListener("click", () => {
  state.stores = state.stores.filter((s) => s.id !== activeStoreId);
  state.items = state.items.filter((i) => i.storeId !== activeStoreId);
  activeStoreId = state.stores[0]?.id || null;
  saveState();
  render();
});

render();
</script>
</body>
</html>
